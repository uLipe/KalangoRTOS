name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  qemu-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi qemu-system-arm cmake ninja-build

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain-arm-none-eabi.cmake -DKALANGO_BUILD_TESTS=ON -DKALANGO_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build

      - name: Run QEMU tests
        continue-on-error: true
        run: ctest --test-dir build --output-on-failure -R kalango_test
