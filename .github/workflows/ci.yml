name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Build and cache the Docker dev image in GHCR ──────────────────────────
  #
  # The image compiles QEMU from source (~20-30 min on first build).
  # Subsequent runs reuse layer cache stored in the registry, bringing
  # cold-start cost down to a few minutes.
  docker-image:
    name: Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.info.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image name
        id: info
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${OWNER}/ulmk-dev" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.info.outputs.image }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: tools/docker
          target: dev
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ steps.info.outputs.image }}:buildcache
          cache-to: type=registry,ref=${{ steps.info.outputs.image }}:buildcache,mode=max

  # ── Compile the kernel (hello_world, QEMU board) ──────────────────────────
  build:
    name: Build kernel
    needs: docker-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: |
          IMG="${{ needs.docker-image.outputs.image }}:sha-${{ github.sha }}"
          docker pull "$IMG"
          docker tag  "$IMG" ulipe-microkernel:dev

      - name: Build kernel (hello_world + ping_pong)
        run: |
          python3 tools/dev.py build \
            --component hello_world \
            --component ping_pong

  # ── Unit tests (host-compiled with Unity, no QEMU needed) ─────────────────
  unit-tests:
    name: Unit tests
    needs: docker-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: |
          IMG="${{ needs.docker-image.outputs.image }}:sha-${{ github.sha }}"
          docker pull "$IMG"
          docker tag  "$IMG" ulipe-microkernel:dev

      - name: Run unit tests
        run: python3 tools/dev.py tests unit --json-dir ci-results/unit

      - name: Upload unit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-unit
          path: ci-results/unit/
          if-no-files-found: warn

  # ── SDK suite (black-box QEMU, replaces legacy integ Makefile suites) ─────
  integ-tests:
    name: SDK suite (TriCore)
    needs: docker-image
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: |
          IMG="${{ needs.docker-image.outputs.image }}:sha-${{ github.sha }}"
          docker pull "$IMG"
          docker tag  "$IMG" ulipe-microkernel:dev

      - name: Run SDK suite
        run: python3 tools/dev.py tests e2e --json-dir ci-results/e2e-tricore

      - name: Run arch whitebox (TriCore CSA early)
        run: python3 tools/dev.py tests integ --test sdk_suite/arch_whitebox/ctx_early_tricore --json-dir ci-results/e2e-tricore

      - name: Upload TriCore results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-tricore
          path: ci-results/e2e-tricore/
          if-no-files-found: warn

  # ── RISC-V: build ─────────────────────────────────────────────────────────
  build-riscv:
    name: Build kernel (RISC-V)
    needs: docker-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: |
          IMG="${{ needs.docker-image.outputs.image }}:sha-${{ github.sha }}"
          docker pull "$IMG"
          docker tag  "$IMG" ulipe-microkernel:dev

      - name: Build kernel (qemu_riscv_virt)
        run: |
          python3 tools/dev.py build --board boards/qemu_riscv_virt \
            --component hello_world \
            --component ping_pong

  # ── RISC-V: SDK suite ─────────────────────────────────────────────────────
  integ-tests-riscv:
    name: SDK suite (RISC-V)
    needs: docker-image
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: |
          IMG="${{ needs.docker-image.outputs.image }}:sha-${{ github.sha }}"
          docker pull "$IMG"
          docker tag  "$IMG" ulipe-microkernel:dev

      - name: Run SDK suite
        run: python3 tools/dev.py tests e2e --board boards/qemu_riscv_virt --json-dir ci-results/e2e-riscv

      - name: Upload RISC-V results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-riscv
          path: ci-results/e2e-riscv/
          if-no-files-found: warn

  # ── ARM Cortex-M: build (mps2-an500 M7 + mps2-an505 M33) ──────────────────
  build-arm:
    name: Build kernel (ARM ${{ matrix.board }})
    needs: docker-image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        board: [qemu_mps2_an500, qemu_mps2_an505]
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: |
          IMG="${{ needs.docker-image.outputs.image }}:sha-${{ github.sha }}"
          docker pull "$IMG"
          docker tag  "$IMG" ulipe-microkernel:dev

      - name: Build kernel (${{ matrix.board }})
        run: |
          python3 tools/dev.py build --board boards/${{ matrix.board }} \
            --component hello_world \
            --component ping_pong

  # ── ARM Cortex-M: SDK suite ───────────────────────────────────────────────
  integ-tests-arm:
    name: SDK suite (ARM ${{ matrix.board }})
    needs: docker-image
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        board: [qemu_mps2_an500, qemu_mps2_an505]
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: |
          IMG="${{ needs.docker-image.outputs.image }}:sha-${{ github.sha }}"
          docker pull "$IMG"
          docker tag  "$IMG" ulipe-microkernel:dev

      - name: Run SDK suite
        run: python3 tools/dev.py tests e2e --board boards/${{ matrix.board }} --json-dir ci-results/e2e-arm-${{ matrix.board }}

      - name: Upload ARM results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-arm-${{ matrix.board }}
          path: ci-results/e2e-arm-${{ matrix.board }}/
          if-no-files-found: warn

  # ── Aggregate markdown report (PASS/FAIL/PARTIAL + coverage matrix) ─────
  coverage-report:
    name: Test coverage report
    needs: [unit-tests, integ-tests, integ-tests-riscv, integ-tests-arm]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download all result artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          path: ci-results

      - name: Install PyYAML
        run: pip3 install --user pyyaml

      - name: Generate markdown report
        run: |
          python3 tools/gen_ci_test_report.py \
            --manifest tools/coverage_manifest.yaml \
            --results-dir ci-results \
            --out test-report.md
          cat test-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test-report.md
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test-report.md
