name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Build and cache the Docker dev image in GHCR ──────────────────────────
  #
  # The image compiles QEMU from source (~20-30 min on first build).
  # Subsequent runs reuse layer cache stored in the registry, bringing
  # cold-start cost down to a few minutes.
  docker-image:
    name: Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.info.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image name
        id: info
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${OWNER}/ulmk-dev" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.info.outputs.image }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: tools/docker
          target: dev
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ steps.info.outputs.image }}:buildcache
          cache-to: type=registry,ref=${{ steps.info.outputs.image }}:buildcache,mode=max

  # ── Compile the kernel (hello_world, QEMU board) ──────────────────────────
  build:
    name: Build kernel
    needs: docker-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: |
          IMG="${{ needs.docker-image.outputs.image }}:sha-${{ github.sha }}"
          docker pull "$IMG"
          docker tag  "$IMG" ulipe-microkernel:dev

      - name: Build kernel (hello_world)
        run: python3 tools/dev.py build

  # ── Unit tests (host-compiled with Unity, no QEMU needed) ─────────────────
  unit-tests:
    name: Unit tests
    needs: docker-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: |
          IMG="${{ needs.docker-image.outputs.image }}:sha-${{ github.sha }}"
          docker pull "$IMG"
          docker tag  "$IMG" ulipe-microkernel:dev

      - name: Run unit tests
        run: python3 tools/dev.py tests unit

  # ── Integration tests (tricore-elf-gcc + QEMU, ~12 suites × 120 s each) ───
  integ-tests:
    name: Integration tests
    needs: docker-image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: |
          IMG="${{ needs.docker-image.outputs.image }}:sha-${{ github.sha }}"
          docker pull "$IMG"
          docker tag  "$IMG" ulipe-microkernel:dev

      - name: Run integration tests
        run: python3 tools/dev.py tests integ

  # ── RISC-V: build ─────────────────────────────────────────────────────────
  build-riscv:
    name: Build kernel (RISC-V)
    needs: docker-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: |
          IMG="${{ needs.docker-image.outputs.image }}:sha-${{ github.sha }}"
          docker pull "$IMG"
          docker tag  "$IMG" ulipe-microkernel:dev

      - name: Build kernel (qemu_riscv_virt)
        run: python3 tools/dev.py build --board boards/qemu_riscv_virt

  # ── RISC-V: integration tests ─────────────────────────────────────────────
  integ-tests-riscv:
    name: Integration tests (RISC-V)
    needs: docker-image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: |
          IMG="${{ needs.docker-image.outputs.image }}:sha-${{ github.sha }}"
          docker pull "$IMG"
          docker tag  "$IMG" ulipe-microkernel:dev

      - name: Run integration tests
        run: python3 tools/dev.py tests integ --board boards/qemu_riscv_virt
